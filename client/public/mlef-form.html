<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexMed | Medico-Legal Examination Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .section-title { border-bottom: 2px solid #0d6efd; padding-bottom: 10px; margin-bottom: 20px; color: #0d6efd; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="dashboard.html">LexMed System</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <h3 class="mb-4">Medico-Legal Examination Form (MLEF)</h3>
                
                <div id="alert-box" class="alert d-none" role="alert"></div>

                <form id="mlefForm">
                    <!-- SECTION 1: Header Info -->
                    <div class="form-card border-primary border-top border-4">
                        <h5 class="section-title">1. General Information</h5>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Case ID</label>
                                <input type="number" id="caseId" class="form-control" required placeholder="Enter Forensic Case ID">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">JMO (Doctor) ID</label>
                                <input type="number" id="jmoId" class="form-control" required placeholder="Enter User ID">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Consent Status</label>
                                <select id="consentStatus" class="form-select" required>
                                    <option value="" disabled selected>Select...</option>
                                    <option value="Given">Given</option>
                                    <option value="Refused">Refused</option>
                                    <option value="Implied">Implied (Emergency)</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Brief History Given by Examinee</label>
                                <textarea id="historyGiven" class="form-control" rows="3" placeholder="Describe the incident history..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 2: Injuries -->
                    <div class="form-card">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="section-title mb-0 border-0">2. Injury Records</h5>
                            <button type="button" class="btn btn-sm btn-outline-primary" id="addInjuryBtn">+ Add Injury</button>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered align-middle" id="injuriesTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>Injury Type</th>
                                        <th>Weapon/Force</th>
                                        <th>Body Part</th>
                                        <th>Category</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Dynamic rows injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- SECTION 3: Referrals -->
                    <div class="form-card">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="section-title mb-0 border-0">3. Clinical Referrals</h5>
                            <button type="button" class="btn btn-sm btn-outline-primary" id="addReferralBtn">+ Add Referral</button>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered align-middle" id="referralsTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>Department</th>
                                        <th>Date</th>
                                        <th>Findings/Notes</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Dynamic rows injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-success btn-lg px-5">Submit MLEF</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="js/mlef.js"></script>
</body>
</html>
