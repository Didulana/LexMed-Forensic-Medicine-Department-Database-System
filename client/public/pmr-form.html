<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexMed | Postmortem Report Form (PMR)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .section-title { border-bottom: 2px solid #198754; padding-bottom: 10px; margin-bottom: 20px; color: #198754; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="dashboard.html">LexMed System</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <h3 class="mb-4 text-success">Postmortem Report (PMR) Submission</h3>
                
                <div id="alert-box" class="alert d-none" role="alert"></div>

                <form id="pmrForm">
                    <!-- SECTION 1: Header Info -->
                    <div class="form-card border-success border-top border-4">
                        <h5 class="section-title">1. General Autopsy Information</h5>
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Case ID</label>
                                <input type="number" id="caseId" class="form-control" required placeholder="Forensic Case ID">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">JMO ID</label>
                                <input type="number" id="jmoId" class="form-control" required placeholder="User ID">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Death Category</label>
                                <select id="deathCategory" class="form-select" required>
                                    <option value="" disabled selected>Select...</option>
                                    <option value="Natural">Natural</option>
                                    <option value="Accidental">Accidental</option>
                                    <option value="Suicidal">Suicidal</option>
                                    <option value="Homicidal">Homicidal</option>
                                    <option value="Open">Open Verdict</option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Autopsy Date</label>
                                <input type="datetime-local" id="pmDate" class="form-control" required>
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">External Findings</label>
                                <textarea id="externalFindings" class="form-control" rows="3" placeholder="External injuries, scars, etc..."></textarea>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Internal Findings</label>
                                <textarea id="internalFindings" class="form-control" rows="3" placeholder="Internal organ status..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 2: Cause of Death -->
                    <div class="form-card">
                        <h5 class="section-title">2. Cause of Death</h5>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">1a. Immediate Cause</label>
                                <input type="text" id="immediateCause" class="form-control" required placeholder="Disease or condition directly leading to death">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">1b. Antecedent Cause (Optional)</label>
                                <input type="text" id="antecedentCause" class="form-control" placeholder="Morbid conditions giving rise to the above cause">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">2. Contributory Conditions (Optional)</label>
                                <textarea id="contributory" class="form-control" rows="2" placeholder="Other significant conditions contributing to death"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- SECTION 3: Histology Samples -->
                    <div class="form-card">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="section-title mb-0 border-0">3. Histology Samples Retained</h5>
                            <button type="button" class="btn btn-sm btn-outline-success" id="addSampleBtn">+ Add Sample</button>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered align-middle" id="samplesTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>Tissue/Organ Type</th>
                                        <th>Analysis Instructions/Result</th>
                                        <th style="width: 80px;">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Dynamic rows injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-success btn-lg px-5">Submit PMR</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <script src="js/pmr.js"></script>
</body>
</html>
