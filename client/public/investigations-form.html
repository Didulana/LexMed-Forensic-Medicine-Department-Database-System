<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexMed | Advanced Investigations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .section-title { border-bottom: 2px solid #6f42c1; padding-bottom: 10px; margin-bottom: 20px; color: #6f42c1; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="dashboard.html">LexMed System</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <h3 class="mb-4" style="color: #6f42c1;">Module 6: Advanced Investigations</h3>
        <div id="alert-box" class="alert d-none" role="alert"></div>

        <div class="row">
            <!-- Radiology Form -->
            <div class="col-md-6">
                <div class="form-card border-top border-4" style="border-color: #6f42c1 !important;">
                    <h5 class="section-title">Log Radiology Scan</h5>
                    <form id="radiologyForm">
                        <div class="mb-3">
                            <label class="form-label">Case ID</label>
                            <input type="number" id="radCaseId" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Modality (X-Ray, CT, MRI)</label>
                            <input type="text" id="radModality" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Body Region</label>
                            <input type="text" id="radRegion" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Findings</label>
                            <textarea id="radFindings" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn w-100 text-white" style="background-color: #6f42c1;">Save Radiology Record</button>
                    </form>
                </div>
            </div>

            <!-- Toxicology Form -->
            <div class="col-md-6">
                <div class="form-card border-top border-4" style="border-color: #6f42c1 !important;">
                    <h5 class="section-title">Log Toxicology Test</h5>
                    <form id="toxicologyForm">
                        <div class="mb-3">
                            <label class="form-label">Case ID</label>
                            <input type="number" id="toxCaseId" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sample Material (Blood, Urine)</label>
                            <input type="text" id="toxSample" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Substance Tested (Alcohol, Drugs)</label>
                            <input type="text" id="toxSubstance" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Result</label>
                            <textarea id="toxResult" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn w-100 text-white" style="background-color: #6f42c1;">Save Toxicology Record</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/investigations.js"></script>
</body>
</html>
