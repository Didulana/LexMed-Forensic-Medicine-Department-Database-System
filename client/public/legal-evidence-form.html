<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexMed | Legal & Evidence Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .form-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .section-title { border-bottom: 2px solid #fd7e14; padding-bottom: 10px; margin-bottom: 20px; color: #fd7e14; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="dashboard.html">LexMed System</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <h3 class="mb-4" style="color: #fd7e14;">Module 7: Law & Evidence</h3>
        <div id="alert-box" class="alert d-none" role="alert"></div>

        <div class="row">
            <!-- Evidence Item -->
            <div class="col-md-6">
                <div class="form-card border-top border-4" style="border-color: #fd7e14 !important;">
                    <h5 class="section-title">1. Log Evidence Item</h5>
                    <form id="evidenceForm">
                        <div class="mb-3">
                            <label class="form-label">Case ID</label>
                            <input type="number" id="evCaseId" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Item Type (Weapon, Clothing)</label>
                            <input type="text" id="evType" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="evDesc" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select id="evStatus" class="form-select" required>
                                <option value="Retained">Retained</option>
                                <option value="Transferred">Transferred to Lab</option>
                                <option value="Released">Released to Police</option>
                            </select>
                        </div>
                        <button type="submit" class="btn w-100 text-white" style="background-color: #fd7e14;">Add Evidence</button>
                    </form>
                </div>
            </div>

            <!-- Chain of Custody -->
            <div class="col-md-6">
                <div class="form-card border-top border-4" style="border-color: #fd7e14 !important;">
                    <h5 class="section-title">2. Chain of Custody Transfer</h5>
                    <form id="custodyForm">
                        <div class="mb-3">
                            <label class="form-label">Evidence Item ID</label>
                            <input type="number" id="cocItemId" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Released By (User ID)</label>
                            <input type="number" id="cocReleasedBy" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Received By (Name / Authority)</label>
                            <input type="text" id="cocReceivedBy" class="form-control" required>
                        </div>
                        <button type="submit" class="btn w-100 text-white" style="background-color: #fd7e14;">Log Transfer</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Court Summons -->
            <div class="col-md-6">
                <div class="form-card border-top border-4" style="border-color: #fd7e14 !important;">
                    <h5 class="section-title">3. Court Summons</h5>
                    <form id="summonsForm">
                        <div class="mb-3">
                            <label class="form-label">JMO ID</label>
                            <input type="number" id="sumJmoId" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Case ID</label>
                            <input type="number" id="sumCaseId" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Appearance Date</label>
                            <input type="date" id="sumDate" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <input type="text" id="sumStatus" class="form-control" placeholder="Pending, Attended">
                        </div>
                        <button type="submit" class="btn w-100 text-white" style="background-color: #fd7e14;">Log Summons</button>
                    </form>
                </div>
            </div>

            <!-- Legal Documents -->
            <div class="col-md-6">
                <div class="form-card border-top border-4" style="border-color: #fd7e14 !important;">
                    <h5 class="section-title">4. Legal Documents</h5>
                    <form id="documentForm">
                        <div class="mb-3">
                            <label class="form-label">Case ID</label>
                            <input type="number" id="docCaseId" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Document Type (Inquest, Court Order)</label>
                            <input type="text" id="docType" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Reference Number</label>
                            <input type="text" id="docRef" class="form-control" required>
                        </div>
                        <button type="submit" class="btn w-100 text-white" style="background-color: #fd7e14;">Add Document</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/legal-evidence.js"></script>
</body>
</html>
