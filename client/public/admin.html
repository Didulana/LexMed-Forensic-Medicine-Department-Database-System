<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexMed | Admin Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .form-card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .section-title { border-bottom: 2px solid #6c757d; padding-bottom: 10px; margin-bottom: 20px; color: #6c757d; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="dashboard.html">LexMed System</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <h3 class="mb-4 text-secondary">User & Role Management</h3>
        <div id="alert-box" class="alert d-none" role="alert"></div>

        <div class="row">
            <div class="col-md-6">
                <div class="form-card border-top border-4 border-secondary">
                    <h5 class="section-title">Deactivate Account</h5>
                    <form id="deactivateForm">
                        <div class="mb-3">
                            <label class="form-label">User ID to Deactivate</label>
                            <input type="number" id="deactivateUserId" class="form-control" required placeholder="Enter ID">
                        </div>
                        <button type="submit" class="btn w-100 btn-danger">Deactivate & Lock Session</button>
                        <small class="text-muted mt-2 d-block">This action terminates all active sessions and sets status to 'locked'.</small>
                    </form>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="form-card border-top border-4 border-info">
                    <h5 class="section-title">Other Actions (Demo Mode)</h5>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-secondary" disabled>Create New Account</button>
                        <button class="btn btn-outline-success" disabled>Unlock Account</button>
                        <button class="btn btn-outline-primary" disabled>View Last Login</button>
                    </div>
                    <small class="text-muted mt-3 d-block text-center">These actions require extending the Phase 2 backend endpoints.</small>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('lexmed:ready', () => {
            const user = window.lexmed.user;
            if (!user) return;
            if (user.role !== 'db_admin_role') {
                document.querySelector('.container').innerHTML = `<div class="alert alert-danger mt-5">Access Denied. Admin only.</div>`;
                return;
            }

            const alertBox = document.getElementById('alert-box');
            document.getElementById('deactivateForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const userId = document.getElementById('deactivateUserId').value;
                try {
                    const res = await window.lexmed.fetchAPI(`/admin/users/${userId}/deactivate`, { method: 'POST' });
                    const data = await res.json();
                    if (res.ok) {
                        alertBox.className = 'alert alert-success d-block';
                        alertBox.textContent = `User ${userId} deactivated successfully.`;
                        document.getElementById('deactivateForm').reset();
                    } else {
                        alertBox.className = 'alert alert-danger d-block';
                        alertBox.textContent = data.error || 'Failed to deactivate user.';
                    }
                } catch(err) {
                    alertBox.className = 'alert alert-danger d-block';
                    alertBox.textContent = 'Server error.';
                }
            });
        });
    </script>
</body>
</html>
