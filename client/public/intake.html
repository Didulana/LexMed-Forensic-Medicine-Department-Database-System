<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexMed | Patient Intake</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .form-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="dashboard.html">LexMed System</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h3 class="mb-4">Case & Patient Intake</h3>
                
                <div id="alert-box" class="alert d-none" role="alert"></div>

                <div class="form-card">
                    <form id="intakeForm">
                        <h5 class="mb-3 text-primary">Patient Details</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">NIC / Passport Number</label>
                                <input type="text" id="nic" class="form-control" required placeholder="e.g., 19851234567V">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="patientName" class="form-control" required placeholder="John Doe">
                            </div>
                        </div>

                        <hr class="my-4">
                        <h5 class="mb-3 text-primary">Case Details</h5>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Case Number</label>
                                <input type="text" id="caseNumber" class="form-control" required placeholder="e.g., JMO/2026/001">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Case Category</label>
                                <select id="caseType" class="form-select" required>
                                    <option value="" disabled selected>Select category...</option>
                                    <option value="Clinical">Clinical Exam (MLEF)</option>
                                    <option value="Postmortem">Postmortem (PMR)</option>
                                    <option value="Mixed">Mixed</option>
                                </select>
                            </div>
                        </div>

                        <hr class="my-4">
                        <button type="submit" class="btn btn-primary w-100">Register Case</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/intake.js"></script>
</body>
</html>
