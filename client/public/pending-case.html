<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexMed | Pending Cases</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .table-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="dashboard.html">LexMed System</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <h3 class="mb-2 text-secondary" id="caseTitle">Case Timeline</h3>
                <h5 class="mb-4 text-muted" id="patientInfo">Patient: Loading...</h5>
                
                <div class="row">
                    <div class="col-md-3">
                        <div class="list-group" id="timeline-menu">
                            <a href="#clinical-exams" class="list-group-item list-group-item-action">Clinical Exams</a>
                            <a href="#postmortem" class="list-group-item list-group-item-action">Postmortem</a>
                            <a href="#evidence" class="list-group-item list-group-item-action">Chain of Custody</a>
                        </div>
                    </div>
                    <div class="col-md-9">
                        <!-- Clinical Exams Section -->
                        <div class="card mb-4" id="clinical-exams">
                            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                                <span>Clinical Exams (MLEF)</span>
                                <a href="mlef-form.html" class="btn btn-light btn-sm role-jmo-only">Add MLEF</a>
                            </div>
                            <div class="card-body">
                                <ul class="list-group" id="mlef-list">
                                    <li class="list-group-item text-muted">Loading...</li>
                                </ul>
                            </div>
                        </div>

                        <!-- Postmortem Section -->
                        <div class="card mb-4" id="postmortem">
                            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                                <span>Postmortem (PMR)</span>
                                <a href="pmr-form.html" class="btn btn-light btn-sm role-jmo-only">Add PMR</a>
                            </div>
                            <div class="card-body">
                                <ul class="list-group" id="pmr-list">
                                    <li class="list-group-item text-muted">Loading...</li>
                                </ul>
                            </div>
                        </div>

                        <!-- Evidence Section -->
                        <div class="card mb-4" id="evidence">
                            <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
                                <span>Chain of Custody</span>
                                <a href="legal-evidence-form.html" class="btn btn-dark btn-sm role-clerk-only">Transfer Evidence</a>
                            </div>
                            <div class="card-body">
                                <ul class="list-group" id="evidence-list">
                                    <li class="list-group-item text-muted">Loading...</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>

    <script src="js/pending.js"></script>
</body>
</html>
