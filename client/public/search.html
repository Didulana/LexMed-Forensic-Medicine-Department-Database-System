<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexMed | Search System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .search-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="dashboard.html">LexMed System</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                
                <div class="search-container text-center mb-4">
                    <h2 class="mb-4 text-primary"><i class="fas fa-search"></i> Central Search</h2>
                    <form id="searchForm" class="d-flex justify-content-center">
                        <input type="text" id="searchInput" class="form-control form-control-lg me-2 w-75" placeholder="Search by Case ID, NIC, or Patient Name..." required>
                        <button type="submit" class="btn btn-primary btn-lg px-4"><i class="fas fa-search"></i></button>
                    </form>
                </div>

                <div id="resultsContainer" class="d-none">
                    <h4 class="text-secondary mb-3">Search Results</h4>
                    <div class="table-responsive bg-white rounded shadow-sm">
                        <table class="table table-hover align-middle mb-0" id="resultsTable">
                            <thead class="table-light">
                                <tr>
                                    <th>Case ID</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Patient Name</th>
                                    <th>NIC / Passport</th>
                                    <th>Date of Incident</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Dynamic results -->
                            </tbody>
                        </table>
                    </div>
                    <div id="noResults" class="alert alert-warning mt-3 d-none">No records found matching your query.</div>
                </div>

            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
